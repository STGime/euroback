##############################################################################
# Eurobase CI/CD — GitHub Actions
# Builds and deploys to Scaleway (FR jurisdiction only).
# Images go to Scaleway Container Registry (fr-par).
##############################################################################
name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: rg.fr-par.scw.cloud
  REGISTRY_NS: eurobase-app
  # Closes #96. actions/checkout@v4, setup-go@v5, setup-node@v4
  # are pinned on Node 20 which GitHub deprecates on 2026-06-02
  # (auto-upgraded to Node 24) and removes on 2026-09-16. Opting
  # in to Node 24 now surfaces any incompatibility on CI runs
  # before the platform-wide cutover. Bump the action major
  # versions when each maintainer ships a Node-24-native release;
  # the env var becomes a no-op then.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # -------------------------------------------------------------------------
  # Go tests
  # -------------------------------------------------------------------------
  test-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Run tests
        run: go test ./... -v -race

      - name: Vet
        run: go vet ./...

  # -------------------------------------------------------------------------
  # Console (SvelteKit) build check
  # -------------------------------------------------------------------------
  test-console:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install and build
        run: |
          cd console
          npm ci --include=optional
          npm run build
        env:
          PUBLIC_API_URL: https://api.eurobase.app
          PUBLIC_BUILD_SHA: ${{ github.sha }}

      # svelte-check disabled — too many strict TS warnings from route params.
      # TODO: fix string|undefined params across console pages, then re-enable.
      # - name: Lint
      #   run: |
      #     cd console
      #     npm run check --if-present

  # -------------------------------------------------------------------------
  # Functions runner (Deno) tests — sandbox isolation + ctx.vault.get path
  # -------------------------------------------------------------------------
  test-functions-runner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run tests
        # --no-check: skip type-checking remote std imports (slow, not what
        # this job is for — Docker build catches type errors at image-build
        # time). --unstable-worker-options: needed for sandbox_test.ts
        # which exercises the `Worker { deno: { permissions: 'none' } }`
        # API the runtime relies on. Permissions: read for blob-URL worker
        # bootstrap, env so vault_test can set/clear VAULT_ENCRYPTION_KEY,
        # net for the std assert imports.
        run: deno test --no-check --unstable-worker-options --allow-read --allow-env --allow-net functions-runner/

  # -------------------------------------------------------------------------
  # MCP server build check
  # -------------------------------------------------------------------------
  test-mcp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install and build
        run: |
          cd mcp-server
          npm ci
          npm run build

  # -------------------------------------------------------------------------
  # Build & push images, then deploy to Kapsule
  # Only on main branch after tests pass.
  # -------------------------------------------------------------------------
  deploy:
    needs: [test-go, test-console, test-mcp, test-functions-runner]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Scaleway Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}

      - name: Build and push gateway
        run: |
          docker build \
            -f deploy/docker/Dockerfile.gateway \
            -t ${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/gateway:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/gateway:latest \
            .
          docker push ${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/gateway:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/gateway:latest

      - name: Build and push worker
        run: |
          docker build \
            -f deploy/docker/Dockerfile.worker \
            -t ${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/worker:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/worker:latest \
            .
          docker push ${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/worker:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/worker:latest

      - name: Build and push console
        run: |
          docker build \
            -f deploy/docker/Dockerfile.console \
            --build-arg BUILD_SHA=${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/console:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/console:latest \
            .
          docker push ${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/console:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/console:latest

      - name: Build and push functions runner
        run: |
          docker build \
            -f deploy/docker/Dockerfile.fn \
            -t ${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/functions:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/functions:latest \
            .
          docker push ${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/functions:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/functions:latest

      - name: Build and push MCP server
        run: |
          docker build \
            -f mcp-server/Dockerfile \
            -t ${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/mcp-server:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/mcp-server:latest \
            mcp-server/
          docker push ${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/mcp-server:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/mcp-server:latest

      - name: Build and push migrations image
        run: |
          docker build \
            -f deploy/docker/Dockerfile.migrations \
            -t ${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/migrations:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/migrations:latest \
            .
          docker push ${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/migrations:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/migrations:latest

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Scaleway CLI and get kubeconfig
        run: |
          curl -sL -o /usr/local/bin/scw https://github.com/scaleway/scaleway-cli/releases/download/v2.53.0/scaleway-cli_2.53.0_linux_amd64
          chmod +x /usr/local/bin/scw
          scw version
          mkdir -p ~/.kube
          scw k8s kubeconfig install ${{ secrets.SCW_CLUSTER_ID }}
        env:
          SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
          SCW_DEFAULT_PROJECT_ID: ${{ secrets.SCW_PROJECT_ID }}
          SCW_DEFAULT_ORGANIZATION_ID: ${{ secrets.SCW_PROJECT_ID }}
          SCW_DEFAULT_REGION: fr-par
          SCW_DEFAULT_ZONE: fr-par-1

      - name: Apply K8s manifests (security, ingress, functions, MCP server)
        run: |
          # CVE-2026-31431 (Copy Fail) and CVE-2026-46333 (ssh-keysign-pwn)
          # mitigations must land before any pod restart so newly scheduled
          # pods can't briefly run on a node with algif_aead loaded or
          # unprivileged ptrace enabled.
          kubectl apply -f deploy/k8s/security/disable-algif-aead.yaml
          kubectl apply -f deploy/k8s/security/disable-ptrace.yaml
          # In-cluster Redis replaces managed RED1-micro to cut the
          # beta-stage bill (~€59/mo). Apply before the gateway/worker
          # rollout so REDIS_URL=redis://redis.eurobase.svc.cluster.local
          # resolves the first time those pods start. See
          # docs/runbooks/cost-tier.md.
          kubectl apply -f deploy/k8s/redis.yaml
          kubectl apply -f deploy/k8s/ingress.yaml
          # All Deployment manifests get applied so changes to
          # replicas, resource requests, probes, etc. propagate via
          # the normal deploy. Image tag changes still go through
          # the `kubectl set image` step below — set image wins on
          # the container image; everything else is sourced from
          # the manifest.
          kubectl apply -f deploy/k8s/gateway.yaml
          kubectl apply -f deploy/k8s/worker.yaml
          kubectl apply -f deploy/k8s/console.yaml
          kubectl apply -f deploy/k8s/functions.yaml
          # NetworkPolicy must apply BEFORE the pod rollout so the new
          # net-allowed worker permissions never have a window of
          # reaching cluster-internal IPs.
          kubectl apply -f deploy/k8s/functions-networkpolicy.yaml
          kubectl apply -f deploy/k8s/mcp-server.yaml
          # Health monitor → Discord #alerts. Reads DISCORD_ALERTS_WEBHOOK
          # from eurobase-secrets (optional key); no-ops if it's unset.
          kubectl apply -f deploy/k8s/health-monitor-cronjob.yaml

      - name: Run database migrations
        run: |
          # Job specs are largely immutable — delete any prior instance so
          # this deploy's image gets picked up. --ignore-not-found covers the
          # first-ever run. --cascade=foreground waits for the Job object
          # (and its pods) to be fully removed from the API before the
          # next command runs — without it, the subsequent `apply` raced
          # the background reaper and hit `field is immutable` on the
          # spec.template (PR #107's deploy failed that way).
          kubectl -n eurobase delete job migrate --ignore-not-found --cascade=foreground
          sed "s|eurobase-app/migrations:latest|eurobase-app/migrations:${{ github.sha }}|" \
            deploy/k8s/migrate-job.yaml | kubectl apply -f -
          # Block the rollout on a successful migration. If it fails, bail
          # before touching the gateway — the old gateway keeps running on
          # the old schema.
          kubectl -n eurobase wait --for=condition=complete --timeout=300s job/migrate \
            || (kubectl -n eurobase logs job/migrate --tail=200; exit 1)

      - name: Deploy to Kapsule
        run: |
          kubectl set image deployment/gateway \
            gateway=${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/gateway:${{ github.sha }} \
            -n eurobase
          kubectl set image deployment/worker \
            worker=${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/worker:${{ github.sha }} \
            -n eurobase
          kubectl set image deployment/console \
            console=${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/console:${{ github.sha }} \
            -n eurobase
          kubectl set image deployment/functions \
            deno-runner=${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/functions:${{ github.sha }} \
            -n eurobase
          kubectl set image deployment/mcp-server \
            mcp-server=${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/mcp-server:${{ github.sha }} \
            -n eurobase

      - name: Verify rollout
        run: |
          # In-cluster Redis goes first so rate-limiting + realtime fan-out
          # connect cleanly on gateway startup. Failure here is non-blocking
          # for the gateway (it logs a warning and disables those features),
          # but a clean roll keeps the failure paths out of the deploy log.
          kubectl rollout status statefulset/redis -n eurobase --timeout=120s
          kubectl rollout status daemonset/disable-ptrace -n kube-system --timeout=120s
          kubectl rollout status deployment/gateway -n eurobase --timeout=120s
          kubectl rollout status deployment/worker -n eurobase --timeout=120s
          kubectl rollout status deployment/console -n eurobase --timeout=120s
          kubectl rollout status deployment/functions -n eurobase --timeout=120s
          kubectl rollout status deployment/mcp-server -n eurobase --timeout=120s

      # ----------------------------------------------------------------------
      # Discord #deploys notifications. Configure the channel webhook URL as
      # the repo secret DISCORD_DEPLOY_WEBHOOK. Both steps no-op if it's unset.
      # ----------------------------------------------------------------------
      - name: Notify Discord — deploy succeeded
        if: ${{ success() && env.WEBHOOK != '' }}
        env:
          WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}
        run: |
          payload=$(jq -n \
            --arg title "✅ Deploy succeeded" \
            --arg url "${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}" \
            --arg desc "\`${GITHUB_SHA:0:7}\` deployed to production by ${{ github.actor }}." \
            '{embeds: [{title: $title, url: $url, description: $desc, color: 3066993}]}')
          curl -fsS -X POST "$WEBHOOK" -H "Content-Type: application/json" -d "$payload"

      - name: Notify Discord — deploy failed
        if: ${{ failure() && env.WEBHOOK != '' }}
        env:
          WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}
        run: |
          payload=$(jq -n \
            --arg title "❌ Deploy failed" \
            --arg url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg desc "\`${GITHUB_SHA:0:7}\` by ${{ github.actor }} failed. [View run logs →](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" \
            '{embeds: [{title: $title, url: $url, description: $desc, color: 15158332}]}')
          curl -fsS -X POST "$WEBHOOK" -H "Content-Type: application/json" -d "$payload"
