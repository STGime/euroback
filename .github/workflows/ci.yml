##############################################################################
# Eurobase CI/CD — GitHub Actions
# Builds and deploys to Scaleway (FR jurisdiction only).
# Images go to Scaleway Container Registry (fr-par).
##############################################################################
name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: rg.fr-par.scw.cloud
  REGISTRY_NS: eurobase-app

jobs:
  # -------------------------------------------------------------------------
  # Go tests
  # -------------------------------------------------------------------------
  test-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Run tests
        run: go test ./... -v -race

      - name: Vet
        run: go vet ./...

  # -------------------------------------------------------------------------
  # Console (SvelteKit) build check
  # -------------------------------------------------------------------------
  test-console:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install and build
        run: |
          cd console
          npm ci --include=optional
          npm run build
        env:
          PUBLIC_API_URL: https://api.eurobase.app
          PUBLIC_BUILD_SHA: ${{ github.sha }}

      # svelte-check disabled — too many strict TS warnings from route params.
      # TODO: fix string|undefined params across console pages, then re-enable.
      # - name: Lint
      #   run: |
      #     cd console
      #     npm run check --if-present

  # -------------------------------------------------------------------------
  # MCP server build check
  # -------------------------------------------------------------------------
  test-mcp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install and build
        run: |
          cd mcp-server
          npm ci
          npm run build

  # -------------------------------------------------------------------------
  # Build & push images, then deploy to Kapsule
  # Only on main branch after tests pass.
  # -------------------------------------------------------------------------
  deploy:
    needs: [test-go, test-console, test-mcp]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Scaleway Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}

      - name: Build and push gateway
        run: |
          docker build \
            -f deploy/docker/Dockerfile.gateway \
            -t ${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/gateway:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/gateway:latest \
            .
          docker push ${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/gateway:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/gateway:latest

      - name: Build and push worker
        run: |
          docker build \
            -f deploy/docker/Dockerfile.worker \
            -t ${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/worker:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/worker:latest \
            .
          docker push ${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/worker:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/worker:latest

      - name: Build and push console
        run: |
          docker build \
            -f deploy/docker/Dockerfile.console \
            --build-arg BUILD_SHA=${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/console:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/console:latest \
            .
          docker push ${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/console:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/console:latest

      - name: Build and push functions runner
        run: |
          docker build \
            -f deploy/docker/Dockerfile.fn \
            -t ${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/functions:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/functions:latest \
            .
          docker push ${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/functions:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/functions:latest

      - name: Build and push MCP server
        run: |
          docker build \
            -f mcp-server/Dockerfile \
            -t ${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/mcp-server:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/mcp-server:latest \
            mcp-server/
          docker push ${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/mcp-server:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/mcp-server:latest

      - name: Build and push migrations image
        run: |
          docker build \
            -f deploy/docker/Dockerfile.migrations \
            -t ${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/migrations:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/migrations:latest \
            .
          docker push ${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/migrations:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/migrations:latest

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Scaleway CLI and get kubeconfig
        run: |
          curl -sL -o /usr/local/bin/scw https://github.com/scaleway/scaleway-cli/releases/download/v2.53.0/scaleway-cli_2.53.0_linux_amd64
          chmod +x /usr/local/bin/scw
          scw version
          mkdir -p ~/.kube
          scw k8s kubeconfig install ${{ secrets.SCW_CLUSTER_ID }}
        env:
          SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
          SCW_DEFAULT_PROJECT_ID: ${{ secrets.SCW_PROJECT_ID }}
          SCW_DEFAULT_ORGANIZATION_ID: ${{ secrets.SCW_PROJECT_ID }}
          SCW_DEFAULT_REGION: fr-par
          SCW_DEFAULT_ZONE: fr-par-1

      - name: Apply functions and MCP server K8s manifests
        run: |
          kubectl apply -f deploy/k8s/functions.yaml
          kubectl apply -f deploy/k8s/mcp-server.yaml

      - name: Run database migrations
        run: |
          # Job specs are largely immutable — delete any prior instance so
          # this deploy's image gets picked up. --ignore-not-found covers the
          # first-ever run. Then apply with this deploy's SHA pinned.
          kubectl -n eurobase delete job migrate --ignore-not-found
          sed "s|eurobase-app/migrations:latest|eurobase-app/migrations:${{ github.sha }}|" \
            deploy/k8s/migrate-job.yaml | kubectl apply -f -
          # Block the rollout on a successful migration. If it fails, bail
          # before touching the gateway — the old gateway keeps running on
          # the old schema.
          kubectl -n eurobase wait --for=condition=complete --timeout=300s job/migrate \
            || (kubectl -n eurobase logs job/migrate --tail=200; exit 1)

      - name: Deploy to Kapsule
        run: |
          kubectl set image deployment/gateway \
            gateway=${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/gateway:${{ github.sha }} \
            -n eurobase
          kubectl set image deployment/worker \
            worker=${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/worker:${{ github.sha }} \
            -n eurobase
          kubectl set image deployment/console \
            console=${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/console:${{ github.sha }} \
            -n eurobase
          kubectl set image deployment/functions \
            deno-runner=${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/functions:${{ github.sha }} \
            -n eurobase
          kubectl set image deployment/mcp-server \
            mcp-server=${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/mcp-server:${{ github.sha }} \
            -n eurobase

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/gateway -n eurobase --timeout=120s
          kubectl rollout status deployment/worker -n eurobase --timeout=120s
          kubectl rollout status deployment/console -n eurobase --timeout=120s
          kubectl rollout status deployment/functions -n eurobase --timeout=120s
          kubectl rollout status deployment/mcp-server -n eurobase --timeout=120s
