##############################################################################
# Eurobase CLI release
#
# Trigger: push a tag like `cli-v0.3.0` (the `cli-` prefix keeps CLI tags
# distinct from SDK releases, which use plain v* tags).
#
#   git tag cli-v0.3.0 && git push origin cli-v0.3.0
#
# What it does:
#   1. Cross-compiles cmd/eurobase for darwin/linux × amd64/arm64 with the
#      version + commit baked in via ldflags (`eurobase version`).
#   2. Publishes a GitHub release with the four tarballs + checksums on the
#      PUBLIC STGime/homebrew-tap repo — the source repo is private, so
#      assets must live somewhere users (and brew) can download without
#      auth. The tap repo doubles as the release host.
#   3. Regenerates Formula/eurobase.rb in the tap from the new checksums,
#      so `brew install stgime/tap/eurobase` (and `brew upgrade`) track
#      the release automatically.
#
# Required secret: CLI_RELEASE_TOKEN — a PAT with `repo` (contents: write)
# access to STGime/homebrew-tap. The default GITHUB_TOKEN is scoped to
# this repo and cannot publish there.
##############################################################################
name: Release CLI

on:
  push:
    tags: ['cli-v*']

permissions:
  contents: read

env:
  TAP_REPO: STGime/homebrew-tap

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build binaries
        run: |
          VERSION="${GITHUB_REF_NAME#cli-v}"
          COMMIT="${GITHUB_SHA::7}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          mkdir -p dist
          for target in darwin/amd64 darwin/arm64 linux/amd64 linux/arm64; do
            GOOS="${target%/*}" GOARCH="${target#*/}" CGO_ENABLED=0 \
              go build -trimpath \
                -ldflags "-s -w -X main.version=${VERSION} -X main.commit=${COMMIT}" \
                -o "dist/eurobase" ./cmd/eurobase
            tar -czf "dist/eurobase_${VERSION}_${target%/*}_${target#*/}.tar.gz" -C dist eurobase
            rm dist/eurobase
          done
          (cd dist && sha256sum *.tar.gz > "eurobase_${VERSION}_checksums.txt" && cat "eurobase_${VERSION}_checksums.txt")

      - name: Create release on the tap repo
        env:
          GH_TOKEN: ${{ secrets.CLI_RELEASE_TOKEN }}
        run: |
          # Idempotent: a re-run of the same tag (e.g. after a partial
          # failure) replaces the existing release instead of erroring.
          if gh release view "cli-v${VERSION}" --repo "$TAP_REPO" >/dev/null 2>&1; then
            echo "release cli-v${VERSION} already exists on $TAP_REPO — replacing it"
            gh release delete "cli-v${VERSION}" --repo "$TAP_REPO" --cleanup-tag --yes
          fi
          gh release create "cli-v${VERSION}" \
            --repo "$TAP_REPO" \
            --title "Eurobase CLI v${VERSION}" \
            --notes "Eurobase CLI v${VERSION}. Install: \`brew install stgime/tap/eurobase\` or download the binary for your platform below. (macOS, manual download only: run \`xattr -d com.apple.quarantine ./eurobase\` after extracting — the binaries are not notarized; Homebrew installs are unaffected.)" \
            dist/*.tar.gz "dist/eurobase_${VERSION}_checksums.txt"

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.CLI_RELEASE_TOKEN }}
        run: |
          sha() { grep "eurobase_${VERSION}_$1.tar.gz" "dist/eurobase_${VERSION}_checksums.txt" | cut -d' ' -f1; }
          BASE="https://github.com/${TAP_REPO}/releases/download/cli-v${VERSION}"

          mkdir -p tap/Formula
          cat > tap/Formula/eurobase.rb <<EOF
          # Generated by the Release CLI workflow in the eurobase platform repo.
          # Do not edit by hand — the next release overwrites this file.
          class Eurobase < Formula
            desc "Eurobase CLI — EU-sovereign Backend-as-a-Service"
            homepage "https://eurobase.app"
            version "${VERSION}"

            on_macos do
              if Hardware::CPU.arm?
                url "${BASE}/eurobase_${VERSION}_darwin_arm64.tar.gz"
                sha256 "$(sha darwin_arm64)"
              else
                url "${BASE}/eurobase_${VERSION}_darwin_amd64.tar.gz"
                sha256 "$(sha darwin_amd64)"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "${BASE}/eurobase_${VERSION}_linux_arm64.tar.gz"
                sha256 "$(sha linux_arm64)"
              else
                url "${BASE}/eurobase_${VERSION}_linux_amd64.tar.gz"
                sha256 "$(sha linux_amd64)"
              end
            end

            def install
              bin.install "eurobase"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/eurobase version")
            end
          end
          EOF

          # Commit the formula via the API (no git clone needed; handles
          # both first-ever creation and updates).
          existing_sha=$(gh api "repos/${TAP_REPO}/contents/Formula/eurobase.rb" --jq .sha 2>/dev/null || true)
          args=(-f message="Formula: eurobase v${VERSION}" -f content="$(base64 -w0 tap/Formula/eurobase.rb)")
          if [ -n "$existing_sha" ]; then
            args+=(-f sha="$existing_sha")
          fi
          gh api -X PUT "repos/${TAP_REPO}/contents/Formula/eurobase.rb" "${args[@]}"
