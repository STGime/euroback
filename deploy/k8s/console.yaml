##############################################################################
# Eurobase Console — Kubernetes Deployment + Service
#
# SvelteKit app served behind the gateway via /console.eurobase.app.
# The Dockerfile bakes PUBLIC_API_URL=https://api.eurobase.app and
# PUBLIC_BUILD_SHA at image-build time (see deploy/docker/Dockerfile.console).
##############################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: console
  namespace: eurobase
  labels:
    app: console
    component: ui
spec:
  # Single replica during beta. See docs/runbooks/cost-tier.md —
  # bump back to 2 when the first paying Pro customer lands.
  replicas: 1
  selector:
    matchLabels:
      app: console
  template:
    metadata:
      labels:
        app: console
        component: ui
    spec:
      containers:
        - name: console
          image: rg.fr-par.scw.cloud/eurobase-app/console:latest
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            # Optional public Discord invite link. When set, the console shows a
            # "Join Discord" link on the login page and in the sidebar. Read at
            # runtime via $env/dynamic/public (adapter-node), so changing it only
            # needs a console pod restart — no image rebuild. To set it:
            #   kubectl -n eurobase patch configmap eurobase-config --type merge \
            #     -p '{"data":{"discord_url":"https://discord.gg/XXXX"}}'
            #   kubectl -n eurobase rollout restart deployment/console
            - name: PUBLIC_DISCORD_URL
              valueFrom:
                configMapKeyRef:
                  name: eurobase-config
                  key: discord_url
                  optional: true
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
      imagePullSecrets:
        - name: scw-registry
---
apiVersion: v1
kind: Service
metadata:
  name: console
  namespace: eurobase
  labels:
    app: console
spec:
  type: ClusterIP
  selector:
    app: console
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
