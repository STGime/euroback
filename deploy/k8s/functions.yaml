##############################################################################
# Eurobase Edge Functions Runner — Kubernetes Deployment + Service + HPA
##############################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: functions
  namespace: eurobase
  labels:
    app: functions
    component: runtime
spec:
  replicas: 2
  selector:
    matchLabels:
      app: functions
  template:
    metadata:
      labels:
        app: functions
        component: runtime
    spec:
      containers:
        - name: deno-runner
          image: rg.fr-par.scw.cloud/eurobase-app/functions:latest
          ports:
            - containerPort: 8000
              protocol: TCP
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          envFrom:
            - secretRef:
                name: eurobase-secrets
          env:
            - name: PORT
              value: "8000"
            - name: MAX_CONCURRENT_ISOLATES
              value: "50"
            - name: CODE_CACHE_SIZE
              value: "200"
            - name: CODE_CACHE_TTL_SECONDS
              value: "300"
      imagePullSecrets:
        - name: scw-registry
---
apiVersion: v1
kind: Service
metadata:
  name: functions
  namespace: eurobase
  labels:
    app: functions
spec:
  type: ClusterIP
  selector:
    app: functions
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: functions
  namespace: eurobase
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: functions
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
