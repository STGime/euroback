##############################################################################
# Eurobase Gateway — Kubernetes Deployment + Service
##############################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: eurobase
  labels:
    app: gateway
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
        component: api
      annotations:
        # Scraped by Grafana Alloy (see deploy/k8s/cockpit/alloy.yaml),
        # which remote-writes to Scaleway Cockpit.
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: gateway
          image: rg.fr-par.scw.cloud/eurobase-app/gateway:latest
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9100
              protocol: TCP
          resources:
            requests:
              memory: "128Mi"
              cpu: "125m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          envFrom:
            - secretRef:
                name: eurobase-secrets
          env:
            - name: PORT
              value: "8080"
            - name: METRICS_PORT
              value: "9100"
            - name: BUILD_VERSION
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['app.kubernetes.io/version']
                  # Falls back to "unknown" inside the app if the label is unset.
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: eurobase-config
                  key: environment
      imagePullSecrets:
        - name: scw-registry
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: eurobase
  labels:
    app: gateway
spec:
  type: ClusterIP
  selector:
    app: gateway
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 9100
      targetPort: metrics
      protocol: TCP
