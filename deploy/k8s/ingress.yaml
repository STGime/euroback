##############################################################################
# Eurobase Ingress — Nginx + cert-manager (Let's Encrypt TLS)
##############################################################################
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: eurobase-ingress
  namespace: eurobase
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.eurobase.app
        - console.eurobase.app
      secretName: eurobase-tls
    - hosts:
        - "*.eurobase.app"
      secretName: eurobase-wildcard-tls
  rules:
    - host: api.eurobase.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 8080
    - host: console.eurobase.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: console
                port:
                  number: 3000
    - host: "*.eurobase.app"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 8080
---
##############################################################################
# Console Service (referenced by ingress)
##############################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: console
  namespace: eurobase
  labels:
    app: console
    component: ui
spec:
  replicas: 2
  selector:
    matchLabels:
      app: console
  template:
    metadata:
      labels:
        app: console
        component: ui
    spec:
      containers:
        - name: console
          image: rg.fr-par.scw.cloud/eurobase-app/console:latest
          ports:
            - containerPort: 3000
              protocol: TCP
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
      imagePullSecrets:
        - name: scw-registry
---
apiVersion: v1
kind: Service
metadata:
  name: console
  namespace: eurobase
  labels:
    app: console
spec:
  type: ClusterIP
  selector:
    app: console
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
---
##############################################################################
# cert-manager ClusterIssuer for Let's Encrypt (HTTP-01 — explicit hosts)
##############################################################################
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: infra@eurobase.app
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            class: nginx
---
##############################################################################
# cert-manager ClusterIssuer for Let's Encrypt (DNS-01 — wildcards)
#
# Requires the Scaleway DNS cert-manager webhook to be installed:
#   https://github.com/scaleway/cert-manager-webhook-scaleway
#
# And a secret named "scaleway-credentials" in the cert-manager namespace
# with SCW_ACCESS_KEY and SCW_SECRET_KEY.
##############################################################################
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod-dns
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: infra@eurobase.app
    privateKeySecretRef:
      name: letsencrypt-prod-dns-key
    solvers:
      - dns01:
          webhook:
            groupName: acme.scaleway.com
            solverName: scaleway
            config:
              accessKeySecretRef:
                name: scaleway-credentials
                key: SCW_ACCESS_KEY
              secretKeySecretRef:
                name: scaleway-credentials
                key: SCW_SECRET_KEY
---
##############################################################################
# Wildcard certificate for *.eurobase.app (DNS-01 validated)
##############################################################################
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: eurobase-wildcard
  namespace: eurobase
spec:
  secretName: eurobase-wildcard-tls
  issuerRef:
    name: letsencrypt-prod-dns
    kind: ClusterIssuer
  dnsNames:
    - "*.eurobase.app"
